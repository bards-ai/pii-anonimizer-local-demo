<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" style="background-color: #ffffff; font-family: 'Courier New', Courier, monospace;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
    
    <pattern id="diagonalHatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" 
            style="stroke:#e0e0e0; stroke-width:0.5" />
    </pattern>
  </defs>

  <text x="500" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#000000">LLM Anonymization Workflow (Invoice Data)</text>

  <line x1="500" y1="60" x2="500" y2="480" stroke="#000000" stroke-width="2" stroke-dasharray="5,5" />
  
  <text x="250" y="75" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">LOCAL (Anonymization / De-anonymization)</text>
  
  <rect x="500" y="60" width="500" height="420" fill="url(#diagonalHatch)" />
  <text x="750" y="75" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">THIRD PARTY (LLM Inference)</text>

  <rect x="50" y="100" width="180" height="130" rx="2" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="60" y="125" font-size="14" font-weight="bold" fill="#000000">1. User Prompt</text>
  <text x="60" y="145" font-size="12" fill="#000000">Process Invoice:</text>
  <text x="60" y="165" font-size="12" fill="#000000">Inv #: 9942</text>
  <text x="60" y="185" font-size="12" font-weight="bold" fill="#000000">Client: Alice Smith</text>
  <text x="60" y="205" font-size="12" fill="#000000">Total: $1,250.00</text>

  <line x1="230" y1="165" x2="260" y2="165" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="270" y="100" width="200" height="130" rx="2" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="280" y="125" font-size="14" font-weight="bold" fill="#000000">2. Anonymize Data</text>
  <text x="280" y="145" font-size="12" fill="#000000">Replace PII:</text>
  
  <rect x="280" y="155" width="180" height="50" rx="1" fill="#f8f8f8" stroke="#000000"/>
  <text x="285" y="170" font-size="10" fill="#000000">Alice Smith &gt; &lt;NAME&gt;</text>
  <text x="285" y="185" font-size="10" fill="#000000">$1,250.00  &gt; &lt;FINANCTIAL_AMMOUNT&gt;</text>
  <text x="285" y="200" font-size="9" font-style="italic" fill="#555555">(Mapping stored in vault)</text>

  <line x1="470" y1="165" x2="520" y2="165" stroke="#000000" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="530" y="100" width="220" height="130" rx="2" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="125" font-size="14" font-weight="bold" fill="#000000">3. LLM API Input</text>
  <text x="540" y="145" font-size="12" fill="#000000">Safe Prompt:</text>
  <text x="540" y="165" font-size="12" fill="#000000">Inv #: 9942</text>
  <text x="540" y="185" font-size="12" font-weight="bold" fill="#000000">Client: &lt;NAME&gt;</text>
  <text x="540" y="205" font-size="12" fill="#000000">Total: &lt;FINANCTIAL_AMMOUNT&gt;</text>

  <line x1="640" y1="230" x2="640" y2="280" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="530" y="290" width="220" height="130" rx="2" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="315" font-size="14" font-weight="bold" fill="#000000">4. LLM Result (JSON)</text>
  <text x="540" y="335" font-size="11" fill="#000000">{</text>
  <text x="540" y="350" font-size="11" fill="#000000"> "client_id": &lt;NAME&gt;,</text>
  <text x="540" y="365" font-size="11" fill="#000000"> "inv_total": &lt;FINANCTIAL_AMMOUNT&gt;,</text>
  <text x="540" y="380" font-size="11" fill="#000000"> "extracted": true</text>
  <text x="540" y="395" font-size="11" fill="#000000">}</text>

  <line x1="530" y1="355" x2="480" y2="355" stroke="#000000" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="270" y="290" width="200" height="130" rx="2" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="280" y="315" font-size="14" font-weight="bold" fill="#000000">5. De-anonymize</text>
  <text x="280" y="335" font-size="12" fill="#000000">Restore PII:</text>
  
  <rect x="280" y="345" width="180" height="50" rx="1" fill="#f8f8f8" stroke="#000000"/>
  <text x="285" y="360" font-size="10" fill="#000000">&lt;NAME&gt; &gt; Alice Smith</text>
  <text x="285" y="375" font-size="10" fill="#000000">&lt;FINANCTIAL_AMMOUNT&gt; &gt; $1,250.00</text>
  <text x="285" y="390" font-size="9" font-style="italic" fill="#555555">(Re-inserting real data)</text>

  <line x1="270" y1="355" x2="240" y2="355" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="50" y="290" width="180" height="130" rx="2" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="60" y="315" font-size="14" font-weight="bold" fill="#000000">6. Final Output</text>
  <text x="60" y="335" font-size="11" fill="#000000">{</text>
  <text x="60" y="350" font-size="11" font-weight="bold" fill="#000000"> "client_id": "Alice Smith",</text>
  <text x="60" y="365" font-size="11" fill="#000000"> "inv_total": "$1,250.00",</text>
  <text x="60" y="380" font-size="11" fill="#000000"> "extracted": true</text>
  <text x="60" y="395" font-size="11" fill="#000000">}</text>

</svg>